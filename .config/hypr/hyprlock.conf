# --- 全局动画 ---
animations {
    enabled = true
    bezier = linear, 1, 1, 0, 0
    bezier = interactive, 0.07, 1, 0.1, 1.1
    animation = fadeIn, 1, 5, interactive
    animation = fadeOut, 1, 3, linear
}

# --- 基础设置 ---
general {
    no_fade_in = false
    grace = 0
    disable_loading = true
    hide_cursor = true
}

# --- 背景优化 ---
background {
    monitor =
    path = screenshot
    blur_passes = 3       # 增加模糊 passes，背景更通透
    blur_size = 10
    noise = 0.0117
    contrast = 0.8
    brightness = 0.4
    vibrancy = 0.2
    vibrancy_darkness = 0.2
}

# --- 装饰性卡片 (解决上下拥挤的核心) ---
# 给时间添加一个半透明底座，增加视觉模块感
shape {
    monitor =
    size = 550, 300
    color = rgba(255, 255, 255, 0.05)
    rounding = 20
    border_size = 2
    border_color = rgba(255, 255, 255, 0.1)
    position = 0, 220
    halign = center
    valign = center
    zindex = 0
}

# --- 1. 时间：超粗体 + 霓虹阴影 ---
label {
    monitor =
    text = $TIME
    color = rgba(203, 166, 247, 1.0) # 薰衣草紫
    font_size = 110
    font_family = JetBrainsMono Nerd Font ExtraBold
    shadow_passes = 3
    shadow_size = 5
    position = 0, 240 # 调高位置
    halign = center
    valign = center
    zindex = 1
}

# --- 2. 日期：独立模块 ---
label {
    monitor =
    text = cmd[update:43200000] echo "$(date +'%A, %d %B')"
    color = rgba(255, 255, 255, 0.8)
    font_size = 22
    font_family = JetBrainsMono Nerd Font SemiBold
    position = 0, 130 # 与时间拉开 80px 的间距
    halign = center
    valign = center
    zindex = 1
}




# --- 5. 输入框：极简胶囊 ---
input-field {
    monitor =
    size = 320, 55
    outline_thickness = 4
    dots_size = 0.25
    dots_spacing = 0.4
    dots_center = true
    
    outer_color = rgba(255, 255, 255, 0.1)
    inner_color = rgba(0, 0, 0, 0.2)
    font_color = rgb(205, 214, 244)
    
    check_color = rgba(166, 227, 16 green, 0.8)
    fail_color = rgba(243, 139, 168, 0.8)
    
    fade_on_empty = false
    placeholder_text = <span foreground="##ffffff66">󰌾  System Locked</span>
    hide_input = false
    
    position = 0, -150 # 向下拉开，避免和日期打架
    halign = center
    valign = center
}

# --- 6. 电池与系统状态 (右下角) ---
label {
    monitor =
    text = cmd[update:1000] echo "󰁹 $(cat /sys/class/power_supply/BAT0/capacity)%"
    color = rgba(166, 227, 161, 0.8)
    font_size = 16
    font_family = JetBrainsMono Nerd Font
    position = -40, 40
    halign = right
    valign = bottom
}
