# --- 基础设置 ---
general {
    no_fade_in = false
    grace = 0
    disable_loading = true
}

# --- 背景：自动截取桌面并开启毛玻璃模糊 ---
background {
    monitor =
    path = screenshot      # 自动截取当前桌面，省去手动设置壁纸的麻烦
    blur_passes = 3        # 模糊程度，3最合适
    blur_size = 8
    noise = 0.0117
    contrast = 0.8916
    brightness = 0.7       # 稍微调暗，突出文字
}

# --- 时间：大字体居中 ---
label {
    monitor =
    text = $TIME
    color = rgba(255, 255, 255, 1.0)
    font_size = 100
    font_family = JetBrainsMono Nerd Font Mono
    position = 0, 100
    halign = center
    valign = center
}

# --- 日期 ---
label {
    monitor =
    text = cmd[update:1000] echo "$(date +'%a %b %d')"
    color = rgba(255, 255, 255, 0.8)  # 稍微透明一点，更有高级感
    font_size = 24
    font_family = JetBrainsMono Nerd Font Mono
    position = 0, 0
    halign = center
    valign = center
}

# --- 输入框：胶囊风格 ---
input-field {
    monitor =
    size = 250, 50
    outline_thickness = 3
    dots_size = 0.33
    dots_spacing = 0.15
    dots_center = true
    outer_color = rgba(255, 255, 255, 0) # 边框透明
    inner_color = rgba(255, 255, 255, 0.1) # 半透明输入框
    font_color = rgb(255, 255, 255)
    fade_on_empty = true
    placeholder_text = <i>Input Password...</i>
    hide_input = false
    position = 0, -100
    halign = center
    valign = center
}